<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #38a169;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }
    .status {
      padding: 20px 16px;
      text-align: center;
    }
    .env-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .status-label {
      margin-top: 8px;
      color: #666;
      font-size: 12px;
    }
    .no-match {
      color: #999;
      font-size: 13px;
    }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }
    .footer a {
      color: #3182ce;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }
    .disabled-overlay {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>EnvMarker</h1>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="globalToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="status" id="statusArea">
    <div class="no-match">Loading...</div>
  </div>

  <div class="footer">
    <a id="openOptions">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
